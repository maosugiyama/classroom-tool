<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIデータ・デジタル入門 授業ツール｜杉山真央</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&family=DM+Serif+Display:ital@0;1&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f1ec;--surface:#ffffff;--border:#e0d9d0;
  --ink:#2d2925;--muted:#6b635a;--light:#a09890;
  --sage:#6f9c74;--sage-l:#e8f0e8;
  --terra:#c4836a;--terra-l:#f5ebe5;
  --slate:#6e8fad;--slate-l:#e4ecf3;
  --gold:#b09265;--gold-l:#f3eedd;
  --plum:#9478a8;--plum-l:#ede8f3;
  --r:10px;
  --acc:var(--sage);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.7;min-height:100vh;}

/* ── HOME ── */
.home{max-width:980px;margin:0 auto;padding:64px 24px 100px;animation:fadeUp .4s ease;}
.home-head{text-align:center;margin-bottom:52px;}
.eyebrow{font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--light);margin-bottom:14px;}
.home-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.5rem,3.5vw,2.1rem);font-weight:600;line-height:1.5;margin-bottom:6px;}
.home-meta{font-size:.85rem;color:var(--muted);}
.home-line{width:40px;height:1px;background:var(--border);margin:28px auto 0;}
.sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px 22px 22px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,var(--sage));}
.scard:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.11);}
.scard-num{font-family:'DM Serif Display',serif;font-style:italic;font-size:2.6rem;color:var(--border);line-height:1;margin-bottom:10px;}
.scard-lbl{font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--c,var(--sage));font-weight:500;margin-bottom:5px;}
.scard-title{font-family:'Noto Serif JP',serif;font-size:1.08rem;font-weight:600;margin-bottom:3px;}
.scard-sub{font-size:.78rem;color:var(--muted);}
.scard-footer{margin-top:18px;font-family:'Jost',sans-serif;font-size:.7rem;color:var(--light);}

/* ── SESSION VIEW ── */
.session-view{display:none;min-height:100vh;}
.session-view.on{display:block;}
.snav{position:sticky;top:0;background:rgba(245,241,236,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:200;flex-wrap:wrap;}
.back-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:4px 0;transition:color .2s;white-space:nowrap;}
.back-btn:hover{color:var(--ink);}
.snav-title{font-size:.88rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sdots{display:flex;gap:5px;align-items:center;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .2s,transform .2s;border:none;position:relative;}
.sdot.active{background:var(--acc);transform:scale(1.35);}
.sdot.done{background:var(--acc);opacity:.4;}
.sdot::after{content:attr(data-label);position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:.75rem;font-weight:500;white-space:nowrap;padding:5px 11px;border-radius:6px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:500;box-shadow:0 3px 10px rgba(0,0,0,.2);}
.sdot::before{content:'';position:absolute;top:calc(100% + 5px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:var(--ink);pointer-events:none;opacity:0;transition:opacity .15s;z-index:500;}
.sdot:hover::after,.sdot:hover::before{opacity:1;}


/* ── STEP CONTENT ── */
.step-wrap{max-width:880px;margin:0 auto;padding:44px 24px 100px;animation:fadeUp .3s ease;}
.step-badge{display:inline-flex;align-items:center;gap:6px;font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--acc);font-weight:500;margin-bottom:8px;}
.step-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.35rem,3vw,1.9rem);font-weight:600;line-height:1.4;margin-bottom:6px;}
.step-time{font-size:.82rem;color:var(--muted);margin-bottom:36px;}

/* ── KP CARDS (clickable) ── */
.kp-list{display:flex;flex-direction:column;gap:14px;margin-bottom:20px;}
.kp{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--acc);border-radius:0 var(--r) var(--r) 0;padding:18px 22px;cursor:pointer;transition:box-shadow .2s,transform .2s;position:relative;}
.kp:hover{box-shadow:0 4px 18px rgba(0,0,0,.09);transform:translateX(3px);}
.kp-inner{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.kp-body{flex:1;}
.kp h4{font-weight:700;font-size:.93rem;margin-bottom:6px;}
.kp p,.kp ul{font-size:.87rem;color:var(--muted);line-height:1.75;}
.kp ul{list-style:none;display:flex;flex-direction:column;gap:3px;}
.kp li{padding-left:14px;position:relative;}
.kp li::before{content:'·';position:absolute;left:0;color:var(--acc);font-size:1.1rem;top:-2px;}
.kp-arrow{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--light);margin-top:2px;transition:background .2s,color .2s;}
.kp:hover .kp-arrow{background:var(--acc);color:#fff;border-color:var(--acc);}
.kp-hint{font-family:'Jost',sans-serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--light);margin-top:8px;}

/* ── DETAIL PANEL ── */
.detail-panel{position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
.detail-panel.open{transform:translateX(0);}
.dp-nav{position:sticky;top:0;background:rgba(245,241,236,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;gap:12px;z-index:10;}
.dp-nav-title{font-size:.88rem;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted);}
.dp-wrap{max-width:820px;margin:0 auto;padding:44px 24px 100px;}
.dp-category{font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--acc);margin-bottom:8px;}
.dp-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.2rem,2.8vw,1.75rem);font-weight:600;line-height:1.4;margin-bottom:28px;}

/* detail content components */
.dp-section{margin-bottom:36px;}
.dp-section-label{font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--light);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.dp-section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.dp-para{font-size:.92rem;line-height:1.9;color:var(--muted);margin-bottom:14px;}
.dp-para strong{color:var(--ink);}

.dp-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:20px;}
.dp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 20px 16px;}
.dp-card-icon{font-size:1.6rem;margin-bottom:10px;display:block;}
.dp-card-title{font-weight:700;font-size:.9rem;margin-bottom:6px;}
.dp-card-body{font-size:.84rem;color:var(--muted);line-height:1.75;}

.dp-example{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.dp-ex-hd{background:var(--bg);padding:9px 18px;font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--light);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.dp-ex-body{padding:16px 20px;font-size:.9rem;line-height:1.85;color:var(--ink);}
.dp-ex-note{padding:0 20px 14px;font-size:.82rem;color:var(--muted);}

.dp-compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.dp-cmp-col{border-radius:var(--r);padding:16px 18px;}
.dp-cmp-col.good{background:var(--sage-l);border:1px solid #b8d8bb;}
.dp-cmp-col.bad{background:var(--terra-l);border:1px solid #e0bdb0;}
.dp-cmp-lbl{font-family:'Jost',sans-serif;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;font-weight:600;margin-bottom:8px;}
.dp-cmp-col.good .dp-cmp-lbl{color:var(--sage);}
.dp-cmp-col.bad .dp-cmp-lbl{color:var(--terra);}
.dp-cmp-col p{font-size:.88rem;line-height:1.75;color:var(--ink);}

.dp-quote{background:var(--surface);border-left:4px solid var(--acc);padding:18px 22px;border-radius:0 var(--r) var(--r) 0;margin-bottom:14px;}
.dp-quote p{font-size:.95rem;line-height:1.85;font-style:italic;color:var(--ink);}
.dp-quote cite{display:block;font-size:.78rem;color:var(--light);margin-top:8px;font-style:normal;}

.dp-steps{display:flex;flex-direction:column;gap:0;margin-bottom:20px;}
.dp-step{display:grid;grid-template-columns:32px 1fr;gap:0 16px;padding:14px 0;border-bottom:1px solid var(--border);}
.dp-step:last-child{border-bottom:none;}
.dp-step-num{width:32px;height:32px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Jost',sans-serif;font-size:.78rem;font-weight:600;flex-shrink:0;margin-top:2px;}
.dp-step-content h5{font-size:.9rem;font-weight:700;margin-bottom:4px;}
.dp-step-content p{font-size:.85rem;color:var(--muted);line-height:1.7;}

.dp-tag-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.dp-tag{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:100px;font-size:.82rem;font-weight:500;border:1.5px solid;}

.dp-tbl{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:.86rem;}
.dp-tbl th{background:var(--bg);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500;}
.dp-tbl td{padding:10px 14px;border-bottom:1px solid var(--border);line-height:1.65;}
.dp-tbl tr:last-child td{border-bottom:none;}
.dp-tbl td:first-child{font-weight:600;white-space:nowrap;}

.dp-point-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:14px;}
.dp-point-box h5{font-size:.93rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.dp-point-box p,.dp-point-box ul{font-size:.88rem;color:var(--muted);line-height:1.75;}
.dp-point-box ul{list-style:none;display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.dp-point-box li{padding-left:16px;position:relative;}
.dp-point-box li::before{content:'→';position:absolute;left:0;color:var(--acc);font-size:.78rem;top:3px;}

.dp-highlight{background:var(--gold-l);border:1px solid #d4bc96;border-radius:var(--r);padding:18px 22px;margin-bottom:14px;}
.dp-highlight p{font-size:.9rem;line-height:1.8;color:var(--ink);}
.dp-highlight strong{color:var(--gold);}

/* ── TERMS PANEL (slides from left) ── */
.terms-panel{position:fixed;inset:0;background:var(--bg);z-index:310;overflow-y:auto;transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
.terms-panel.open{transform:translateX(0);}
.tp-nav{position:sticky;top:0;background:rgba(245,241,236,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;gap:12px;z-index:10;}
.tp-session-badge{font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;padding:3px 10px;border-radius:100px;flex-shrink:0;}
.tp-title{font-size:.88rem;font-weight:500;flex:1;color:var(--muted);}
.tp-body{max-width:820px;margin:0 auto;padding:36px 24px 100px;}
.tp-heading{font-family:'Noto Serif JP',serif;font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:600;margin-bottom:6px;}
.tp-sub{font-size:.84rem;color:var(--muted);margin-bottom:28px;}
.term-search-wrap{position:relative;margin-bottom:28px;}
.term-search{width:100%;padding:11px 16px 11px 40px;border:1px solid var(--border);border-radius:100px;background:var(--surface);font-family:'Noto Sans JP',sans-serif;font-size:.9rem;color:var(--ink);outline:none;transition:border-color .2s;}
.term-search:focus{border-color:var(--tp-acc,var(--sage));}
.term-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--light);pointer-events:none;}
.term-count{font-family:'Jost',sans-serif;font-size:.72rem;color:var(--light);margin-bottom:16px;}
.terms-list{display:flex;flex-direction:column;gap:0;}
.term-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:10px;transition:box-shadow .2s;}
.term-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.08);}
.term-card.hidden{display:none;}
.term-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
.term-ja{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:600;color:var(--ink);line-height:1.5;flex-wrap:wrap;}
.term-slash{color:var(--border);margin:0 5px;font-weight:300;font-family:'Jost',sans-serif;}
.term-en-inline{font-family:'Jost',sans-serif;font-size:.88rem;font-weight:400;color:var(--light);letter-spacing:.03em;}
.term-reading{display:block;font-size:.75rem;color:var(--light);font-family:'Noto Sans JP',sans-serif;margin-top:2px;}
.term-loan{font-family:'Jost',sans-serif;font-size:.88rem;font-weight:400;color:var(--light);margin-left:6px;letter-spacing:.02em;}
.term-en{font-family:'Jost',sans-serif;font-size:.78rem;color:var(--tp-acc,var(--sage));font-weight:500;letter-spacing:.04em;flex-shrink:0;padding-top:3px;}
.term-ety{display:block;font-size:.78rem;color:var(--muted);margin-top:4px;line-height:1.6;}
.term-wasei-badge{display:inline-block;font-family:'Jost',sans-serif;font-size:.6rem;letter-spacing:.1em;padding:1px 7px;border-radius:100px;background:#f0e8d8;color:#8a6840;border:1px solid #d4bc96;margin-top:4px;font-weight:600;}
.term-cats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.term-cat{font-family:'Jost',sans-serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 9px;border-radius:100px;font-weight:600;background:var(--tp-acc-l,var(--sage-l));color:var(--tp-acc,var(--sage));}
.term-def{font-size:.88rem;color:var(--muted);line-height:1.8;margin-bottom:8px;}
.term-ex{background:var(--bg);border-radius:6px;padding:10px 14px;font-size:.83rem;color:var(--muted);line-height:1.7;border-left:2px solid var(--tp-acc,var(--sage));}
.term-ex-lbl{font-family:'Jost',sans-serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--light);margin-bottom:3px;}
.terms-empty{text-align:center;padding:52px 24px;color:var(--light);font-size:.9rem;}
.terms-btn{display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.08em;color:var(--muted);transition:all .2s;white-space:nowrap;flex-shrink:0;}
.terms-btn:hover{border-color:var(--acc);color:var(--ink);}
.terms-btn svg{flex-shrink:0;}
/* home card terms link */
.scard-terms{display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--light);cursor:pointer;transition:color .2s;}
.scard-terms:hover{color:var(--c,var(--sage));}

/* ── MOVIE EXERCISE ── */
.movie-intro{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:20px;font-size:.88rem;color:var(--muted);line-height:1.7;}
.movie-intro strong{color:var(--ink);}
.movie-era-group{margin-bottom:32px;}
.movie-era-label{font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--light);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.movie-era-label::after{content:'';flex:1;height:1px;background:var(--border);}
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.movie-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:box-shadow .2s,transform .2s;}
.movie-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.12);transform:translateY(-2px);}
.movie-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg);}
.movie-poster-placeholder{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg) 0%,var(--border) 100%);color:var(--light);font-size:2rem;}
.movie-info{padding:12px 13px 14px;}
.movie-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:4px;}
.movie-title{font-family:'Noto Serif JP',serif;font-size:.92rem;font-weight:600;line-height:1.4;color:var(--ink);}
.movie-country{font-family:'Jost',sans-serif;font-size:.65rem;padding:1px 7px;border-radius:100px;font-weight:600;flex-shrink:0;margin-top:2px;}
.movie-country.jp{background:#fde8e8;color:#b05050;}
.movie-country.us{background:#e8edf5;color:#4a6090;}
.movie-year{font-family:'Jost',sans-serif;font-size:.72rem;color:var(--light);margin-bottom:7px;}
.movie-synopsis{font-size:.78rem;color:var(--muted);line-height:1.65;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;transition:all .2s;}
.movie-synopsis.open{display:block;-webkit-line-clamp:unset;overflow:visible;}
.synopsis-toggle{font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.06em;color:var(--tp-acc,var(--terra));background:none;border:none;cursor:pointer;padding:0 0 8px;display:block;}
.movie-genre-btns{display:flex;flex-wrap:wrap;gap:5px;}
.mgbtn{font-size:.72rem;padding:3px 9px;border-radius:100px;border:1.5px solid var(--border);background:none;cursor:pointer;color:var(--muted);font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.mgbtn:hover{opacity:.85;}
.mgbtn.sel{color:#fff;border-color:transparent;background:var(--terra);}
.movie-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.movie-loading{text-align:center;padding:40px;color:var(--light);font-size:.9rem;}

/* ── STEP FOOTER NAV ── */
.sfooter{position:fixed;bottom:0;left:0;right:0;background:rgba(245,241,236,.95);backdrop-filter:blur(8px);border-top:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;z-index:99;}
.snav-btn{display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Jost',sans-serif;font-size:.76rem;letter-spacing:.07em;color:var(--muted);transition:all .2s;}
.snav-btn:hover{border-color:var(--acc);color:var(--ink);}
.snav-btn.primary{background:var(--acc);border-color:var(--acc);color:#fff;}
.snav-btn.primary:hover{opacity:.88;}
.snav-btn:disabled{opacity:.3;cursor:default;pointer-events:none;}
.sfooter-info{font-family:'Jost',sans-serif;font-size:.73rem;color:var(--light);}
.print-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.07em;color:var(--muted);transition:all .2s;white-space:nowrap;}
.print-btn:hover{border-color:var(--acc);color:var(--ink);}

@media print{
  .snav,.sfooter,.terms-btn,.print-btn,.detail-panel,.terms-panel{display:none!important;}
  .step-wrap{padding:20px!important;max-width:100%!important;}
  body{background:#fff!important;}
  .movie-card{break-inside:avoid;}
  .movie-synopsis{display:block!important;-webkit-line-clamp:unset!important;overflow:visible!important;}

.sbtn.sel{color:#fff;border-color:transparent;}

.sbtn[data-e="皮肉"].sel{background:#7a8a9e;}

.note-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}

<script>
// ══════════════════════════════════════════
// TERMS DATA
// ══════════════════════════════════════════
const TERMS = [
  // ── Session 6 ──────────────────────────
  { si:0,
    terms:[
      { ja:'生成AI', reading:'せいせいAI', en:'Generative AI',
        cats:['技術'],
        def:'テキスト・画像・音声などを新たに「生成」するAIの総称。大量のデータを学習し、指示（プロンプト）に応じて確率的に出力を作り出す。ChatGPT・Gemini・Midjourney などが代表例。',
        ex:'「生成AIとは何か」を中学生向け・大学生向けに書き分けると、語彙や例の出し方が変わる。' },

      { ja:'アルゴリズム', kana:true, loan:'algorithm', en:'Algorithm',
        ety:'9世紀のアラビアの数学者 al-Khwārizmī（フワーリズミー）の名がラテン語化されて "algorismus"、のちに "algorithm" に定着。「算法・計算手順」の意。英語からの直接借用語。',
        cats:['技術'],
        def:'問題を解くための手順・処理の流れを形式化したもの。AIのレコメンドや検索順位の決定など、どのように判断・選択するかを定義したルール群。',
        ex:'SNSのタイムラインに何を表示するかは、各プラットフォームのアルゴリズムが決定している。' },

      { ja:'学習データ', reading:'がくしゅうデータ', en:'Training Data',
        cats:['技術','データ'],
        def:'AIのモデルを訓練するために使うデータの集合。このデータの内容・偏り・量がAIの出力の質と傾向を大きく左右する。',
        ex:'翻訳AIが英語→日本語に強い理由は、英日の学習データが豊富だからである。' },

      { ja:'バイアス', kana:true, loan:'bias', en:'Bias',
        ety:'ラテン語 "biaxius"（斜め・傾いた）が古フランス語 "biais" を経て英語 "bias" に。布地を斜めに裁断することを指す言葉が語源で、そこから「偏り・傾向」の意に転じた。英語からの直接借用語。',
        cats:['概念','社会'],
        def:'情報・判断・データに含まれる偏り。AIのバイアスは、学習データの偏り・ラベル設計の誤り・開発者の判断などから生まれる。意図せず生まれる場合も多い。',
        ex:'採用AIが女性を低く評価してしまった事例（Amazon, 2018年）は、学習データのバイアスが原因とされる。' },

      { ja:'フレーミング', kana:true, loan:'framing', en:'Framing',
        ety:'英語 "frame"（枠・骨格）の動名詞形。社会学者ゴフマン（1974年）が「フレーム分析」として概念化し、メディア研究・政治コミュニケーション研究に広まった。英語からの直接借用語。',
        cats:['概念','言語'],
        def:'情報をどの「枠組み」で提示するかによって、受け手の解釈や印象を方向づける手法・現象。同じ事実でも、フレームが違えば意味が変わる。',
        ex:'「AI導入で効率化」vs「AI導入で雇用が減少」は、同じ出来事を異なるフレームで伝えている。' },

      { ja:'表現', reading:'ひょうげん', en:'Representation / Expression',
        cats:['概念','言語'],
        def:'何かを語・文・画像などを使って表すこと。どの語を選ぶか・どう並べるかによって、同じ内容でも受け手への影響が変わる。',
        ex:'「移民」と「外国人労働者」と「難民」は、指す人が重なる場合でも、語が呼び起こすイメージが異なる。' },

      { ja:'文脈', reading:'ぶんみゃく', en:'Context',
        cats:['概念','言語'],
        def:'ある表現・出来事の前後関係・状況・背景。同じ語でも文脈によって意味や感情が変わる。AIは文脈の把握が苦手な場合がある。',
        ex:'「さすがですね」は褒め言葉にも皮肉にもなる。判断には文脈が必要。' },

      { ja:'受け手', reading:'うけて', en:'Audience / Recipient',
        cats:['概念'],
        def:'テキストや情報が向けられている相手。想定読者・視聴者・利用者。どんな受け手を想定するかで、語彙・例・強調点が変わる。',
        ex:'「生成AIとは何か」の説明は、中学生向けと企業向けでは全く異なる言い方になる。' },

      { ja:'中立性', reading:'ちゅうりつせい', en:'Neutrality',
        cats:['概念','社会'],
        def:'特定の立場・価値観に偏らないこと。AIは「中立」に見えても、学習データや設計に価値判断が含まれるため、完全な中立は難しい。',
        ex:'検索エンジンが上位に表示するページの選定も、アルゴリズムに基づく判断であり、完全に中立ではない。' },

      { ja:'フィルターバブル', kana:true, loan:'filter bubble', en:'Filter Bubble',
        ety:'2010年、米国のネット活動家イーライ・パリサーが著書で命名・普及させた英語の概念語。"filter"（フィルター・選別）＋"bubble"（泡・閉じた空間）の複合語。英語起源で和製英語ではない。',
        cats:['社会','技術'],
        def:'レコメンドアルゴリズムにより、ユーザーが自分の好みや意見に合う情報だけに囲まれるようになる現象。多様な視点に触れる機会が減る。',
        ex:'政治的な関心を持つユーザーのSNSタイムラインは、同じ立場の意見ばかりになりやすい。' },
    ]
  },

  // ── Session 7 ──────────────────────────
  { si:1,
    terms:[
      { ja:'要約', reading:'ようやく', en:'Summarization',
        cats:['技術','言語'],
        def:'元のテキストの主要な情報を保ちながら、長さを短くすること。単なる短縮ではなく、重要情報の選択・再構成・筋道の維持が必要。',
        ex:'400字の記事を50字にまとめると、どの情報が「重要」かの判断が問われる。' },

      { ja:'主旨', reading:'しゅし', en:'Main Point / Gist',
        cats:['言語'],
        def:'テキスト全体が最も伝えようとしていること・中心的な主張。要約では主旨を落とさないことが最優先。',
        ex:'「具体例だけ残って主旨が消えた要約」は、内容があっても要約として失敗している。' },

      { ja:'核心', reading:'かくしん', en:'Core / Essence',
        cats:['言語'],
        def:'文章の中で最も本質的・不可欠な部分。主旨に近い概念で、これを失うと文章の意味が変質してしまう。',
        ex:'「AIは便利だが批判的評価が必要」という主張の核心は「批判的評価」の部分にある。' },

      { ja:'ニュアンス', kana:true, loan:'nuance', en:'Nuance',
        ety:'フランス語 "nuance" から直接借用。もとはラテン語 "nubes"（雲・色合い）に由来し、色の微妙なグラデーションを指す言葉だった。英語・日本語ともにフランス語からの借用語。',

// terms panel state
let termsSessionIdx = -1;

function openTerms(si){
  termsSessionIdx = si;
  const s = SESSIONS[si];
  const tdata = TERMS[si];
  const acc = [s.color,'var(--sage-l)'];
  const accL = ['var(--sage-l)','var(--slate-l)','var(--terra-l)','var(--plum-l)'][si];
  const accC = ['var(--sage)','var(--gold)','var(--terra)','var(--plum)'][si];

  const panel = document.getElementById('terms-panel');
  panel.style.setProperty('--tp-acc', accC);
  panel.style.setProperty('--tp-acc-l', accL);

  const badge = document.getElementById('tp-badge');
  badge.textContent = `第${s.num}回`;
  badge.style.background = accL;
  badge.style.color = accC;

  document.getElementById('tp-heading').textContent = s.title + ' — 用語リスト';
  document.getElementById('tp-sub').textContent = `この授業で登場する重要語 ${tdata.terms.length}語`;
  document.getElementById('term-search').value = '';

  const list = document.getElementById('terms-list');
  list.innerHTML = tdata.terms.map((t,i)=>`
    <div class="term-card" id="term-${i}" data-ja="${t.ja}" data-en="${t.en.toLowerCase()}" data-def="${t.def}">
      <div class="term-header">
        <div style="flex:1">
          <div class="term-ja">${t.ja}<span class="term-slash"> / </span><span class="term-en-inline">${t.en}</span></div>
          ${t.kana
            ? `${t.ety ? `<span class="term-ety">${t.ety}</span>` : ''}
               ${t.wasei ? `<span class="term-wasei-badge">和製英語</span>` : ''}`
            : `<span class="term-reading">${t.reading}</span>`
          }
        </div>
      </div>
      <div class="term-cats">${t.cats.map(c=>`<span class="term-cat">${c}</span>`).join('')}</div>
      <div class="term-def">${t.def}</div>
      <div class="term-ex"><div class="term-ex-lbl">使用例</div>${t.ex}</div>
    </div>`).join('');

  updateTermCount(tdata.terms.length, tdata.terms.length);
  panel.classList.add('open');
  panel.scrollTop = 0;
}

function closeTerms(){
  document.getElementById('terms-panel').classList.remove('open');
}

function filterTerms(q){
  if(termsSessionIdx < 0) return;
  const tdata = TERMS[termsSessionIdx];
  const query = q.toLowerCase().trim();
  let shown = 0;
  tdata.terms.forEach((t,i)=>{
    const card = document.getElementById('term-'+i);
    if(!card) return;
    const match = !query ||
      t.ja.includes(q) ||
      t.en.toLowerCase().includes(query) ||
      t.reading.includes(q) ||
      t.def.includes(q) ||
      t.cats.some(c=>c.includes(q));
    card.classList.toggle('hidden', !match);
    if(match) shown++;
  });
  const empty = document.querySelector('.terms-empty');
  if(shown===0 && !empty){
    document.getElementById('terms-list').insertAdjacentHTML('beforeend','<div class="terms-empty">該当する用語が見つかりませんでした</div>');
  } else if(shown>0 && empty){
    empty.remove();
  }
  updateTermCount(shown, tdata.terms.length);
}

function updateTermCount(shown, total){
  const el = document.getElementById('term-count');
  if(el) el.textContent = shown===total ? `全 ${total} 語` : `${shown} / ${total} 語 表示中`;
}

const movieState = {};

function toggleSyn(id){
  const el=document.getElementById('syn-'+id);
  const btn=el.nextElementSibling;
  if(!el)return;
  const open=el.classList.toggle('open');
  btn.textContent=open?'閉じる ▴':'続きを読む ▾';
}

function setMovieGenre(movieId, genre){
  if(movieState[movieId] === genre){ delete movieState[movieId]; }
  else { movieState[movieId] = genre; }
  document.querySelectorAll(`.mgbtn[data-mid="${movieId}"]`).forEach(b=>{
    b.classList.toggle('sel', b.dataset.genre === movieState[movieId]);
  });
}

function renderMovieStep(){
  return `
    <div class="movie-intro">
      <strong>映画のポスターとあらすじ</strong>を見て、最も当てはまるジャンルを1つ選んでください。
      迷う作品はそのままにしておき、後でグループで理由を共有しましょう。
    </div>
    <div class="movie-legend">
      ${MOVIE_GENRES.map(g=>`<span class="lchip" style="background:var(--terra-l);color:var(--terra);border-color:#e0bdb0">${g}</span>`).join('')}
    </div>
    <div id="movie-cards-wrap">
      ${MOVIES.map(era=>`
        <div class="movie-era-group">
          <div class="movie-era-label">${era.era}</div>
          <div class="movie-grid">
            ${era.films.map(film=>`
              <div class="movie-card">
                <img class="movie-poster"
                     src="${TMDB_IMG}${film.poster}"
                     alt="${film.title}"
                     referrerpolicy="no-referrer"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="movie-poster-placeholder" style="display:none">🎬</div>
                <div class="movie-info">
                  <div class="movie-title-row">
                    <div class="movie-title">${film.title}</div>
                    <span class="movie-country ${film.country}">${film.country==='jp'?'邦画':'洋画'}</span>
                  </div>
                  <div class="movie-year">${film.year}年</div>
                  <div class="movie-synopsis" id="syn-${film.id}">${film.synopsis}</div>
                  <button class="synopsis-toggle" onclick="toggleSyn(${film.id})">続きを読む ▾</button>
                  <div class="movie-genre-btns">
                    ${MOVIE_GENRES.map(g=>`<button class="mgbtn${movieState[film.id]===g?' sel':''}" data-mid="${film.id}" data-genre="${g}" onclick="setMovieGenre(${film.id},'${g}')">${g}</button>`).join('')}
                  </div>
                </div>
              </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>
    <div class="disc-card" style="margin-top:20px">
      <h4>観察のポイント</h4>
      <ul>
        <li>ポスターだけ見たときと、あらすじを読んだ後でジャンル判断が変わった作品はあるか</li>

        <li>複数ジャンルに当てはまって迷った作品はどれか、その理由は</li>
        <li>年代によってジャンルの雰囲気はどう変わっているか</li>
      </ul>
    </div>`;
}

  's8_what_is_classify': {
    category: 'Session 8 — 分類とラベリング',
    title: '分類とは何か',
    html: `
      <div class="dp-section">
        <div class="dp-section-label">分類の基本的な考え方</div>
        <div class="dp-para">分類とは、<strong>共通の性質に基づいてデータをグループに分ける操作</strong>です。私たちは日常的に分類を行っています（食材を野菜・肉・魚に分ける、書類をテーマ別に分ける）。</div>
        <div class="dp-point-box"><h5>重要な問い：何のために分けるのか？</h5><p>分類の目的が変わると、基準も変わります。同じ「映画」でも、次の目的では分け方が異なります：</p><ul><li>興行収入を分析したい → ジャンル・制作費・公開時期</li><li>子どもに見せる映画を選びたい → 年齢区分・暴力表現の有無</li><li>語学学習に使いたい → 使用言語・字幕の有無</li></ul></div>
      </div>
      <div class="dp-section">
        <div class="dp-section-label">分類の手順</div>
        <div class="dp-steps">
          <div class="dp-step"><div class="dp-step-num">1</div><div class="dp-step-content"><h5>目的を決める</h5><p>何のために分類するのか。誰が・どんな場面で・どう使うデータなのかを明確にする。</p></div></div>
          <div class="dp-step"><div class="dp-step-num">2</div><div class="dp-step-content"><h5>カテゴリ（ラベル）を設計する</h5><p>何種類に分けるか・カテゴリ名は何にするかを決める。カテゴリは「網羅的（全データが当てはまる）」かつ「排他的（重複しない）」であることが理想。</p></div></div>
          <div class="dp-step"><div class="dp-step-num">3</div><div class="dp-step-content"><h5>境界例のルールを作る</h5><p>どちらにも当てはまるデータをどう扱うか、事前にルールを決めておく。</p></div></div>
          <div class="dp-step"><div class="dp-step-num">4</div><div class="dp-step-content"><h5>分類を実行・評価する</h5><p>実際に分けてみて、うまくいかない例が多いようなら設計を見直す。</p></div></div>
        </div>
      </div>
      <div class="dp-section">
        <div class="dp-section-label">分類の難しさ</div>
        <div class="dp-example"><div class="dp-ex-hd">例：「トマト」はどのカテゴリか？</div><div class="dp-ex-body">植物学的には「果物（果実）」。料理上の分類では「野菜」。スーパーの売り場では野菜売り場に置かれる。<br>→ 同じモノでも、<strong>目的・文脈・基準</strong>によって分類が変わります。</div></div>
      </div>`
  },

function clsCard(post,idx){
  const c=state.classify[idx]||{};
  return `<div class="cls-card${c.uncertain?' uncert':''}" id="clsc-${idx}">
    <div class="cls-post">${post}</div>
    <div class="cls-btns">
      ${LABELS.map(l=>`<button class="lbtn${c.label===l?' sel':''}" data-l="${l}" onclick="setLabel(${idx},'${l}')">${l}</button>`).join('')}
      <button class="unc-btn${c.uncertain?' on':''}" onclick="toggleUncertain(${idx})">迷い</button>
    </div>
  </div>`;
}

function sentCard(s,idx){
  const e=state.sentiment[idx]||{};
  return `<div class="sent-item">
    <div class="sent-n">${idx+1} ${s.h}</div>
    <div class="sent-txt">${s.t}</div>
    <div class="sent-btns">${EMOTIONS.map(em=>`<button class="sbtn${e.emotion===em?' sel':''}" data-e="${em}" onclick="setEmotion(${idx},'${em}')">${em}</button>`).join('')}</div>
    <input class="sent-note-inp" data-id="sent-note-${idx}" placeholder="根拠となる語・判断理由" value="${e.note||''}" oninput="setNote(${idx},this.value)">
  </div>`;
}

// INTERACTIONS
// ══════════════════════════════════════════
function setLabel(idx,label){
  if(!state.classify[idx])state.classify[idx]={};
  if(state.classify[idx].label===label)delete state.classify[idx].label;
  else state.classify[idx].label=label;
  const card=document.getElementById('clsc-'+idx);
  if(card){card.querySelectorAll('.lbtn').forEach(b=>b.classList.toggle('sel',b.dataset.l===state.classify[idx].label));}
}
function toggleUncertain(idx){
  if(!state.classify[idx])state.classify[idx]={};
  state.classify[idx].uncertain=!state.classify[idx].uncertain;
  const card=document.getElementById('clsc-'+idx);
  if(card){card.classList.toggle('uncert',!!state.classify[idx].uncertain);card.querySelector('.unc-btn').classList.toggle('on',!!state.classify[idx].uncertain);}
}
function setEmotion(idx,em){
  if(!state.sentiment[idx])state.sentiment[idx]={note:''};
  if(state.sentiment[idx].emotion===em)delete state.sentiment[idx].emotion;
  else state.sentiment[idx].emotion=em;
  const item=document.querySelectorAll('.sent-item')[idx];
  if(item){item.querySelectorAll('.sbtn').forEach(b=>b.classList.toggle('sel',b.dataset.e===state.sentiment[idx].emotion));}
}
function setNote(idx,val){if(!state.sentiment[idx])state.sentiment[idx]={};state.sentiment[idx].note=val;}
function updateCtr(ta,ctrid){
  const len=ta.value.length,max=parseInt(ta.dataset.max)||100;
  const el=document.getElementById(ctrid);
  if(el){el.textContent=`${len} / ${max}字`;el.classList.toggle('over',len>max);}
  saveInput(ta);
}
function saveInput(el){if(el.dataset.id)state.inputs[el.dataset.id]=el.value;}
function restoreInputs(){
  document.querySelectorAll('[data-id]').forEach(el=>{
    if(state.inputs[el.dataset.id]!=null){
      el.value=state.inputs[el.dataset.id];
      if(el.dataset.max){
        const cid=el.dataset.id==='sum7-100'?'ctr7-100':el.dataset.id==='sum7-50'?'ctr7-50':null;
        if(cid){const c=document.getElementById(cid);if(c)c.textContent=`${el.value.length} / ${el.dataset.max}字`;}
      }
    }
  });
}

        <div class="scard-footer">${s.steps.length}ステップ ／ ${s.duration}分</div>
        <div class="scard-terms" onclick="event.stopPropagation();openTerms(${i})">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          用語リストを見る
        </div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderSession(){
  const s=SESSIONS[state.si];
  const step=s.steps[state.step];
  const isLast=state.step===s.steps.length-1;
  const isFirst=state.step===0;
  return `
  <div class="session-view on" style="--acc:${s.color}">
    <div class="snav">
      <button class="back-btn" onclick="goHome()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>一覧
      </button>
      <span class="snav-title">第${s.num}回　${s.title}</span>
      <div class="sdots">${s.steps.map((_,i)=>`<button class="sdot ${i===state.step?'active':i<state.step?'done':''}" onclick="gotoStep(${i})" data-label="${s.steps[i].title}"></button>`).join('')}</div>
      <button class="terms-btn" onclick="openTerms(${state.si})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        用語
      </button>
    </div>
    <div class="step-wrap">
      <div class="step-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>${step.badge}</div>
      <h2 class="step-title">${step.title}</h2>
      <div class="step-time">ステップ ${state.step+1} / ${s.steps.length}　（目安 ${step.minutes}分）</div>
      <div class="step-body">${renderStepContent(step.type)}</div>
    </div>
    <div class="sfooter">
      <button class="snav-btn" onclick="prevStep()" ${isFirst?'disabled':''}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>前へ
      </button>
      <span class="sfooter-info">${state.step+1} / ${s.steps.length}　— ${s.steps.slice(0,state.step+1).reduce((a,b)=>a+b.minutes,0)}分経過目安</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="print-btn" onclick="window.print()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          印刷 / PDF保存
        </button>
        <button class="snav-btn primary" onclick="nextStep()" ${isLast?'disabled':''}>
          次へ<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function openSession(i){state.view='session';state.si=i;state.step=0;render();window.scrollTo(0,0);}
function goHome(){state.view='home';render();window.scrollTo(0,0);}
function nextStep(){if(state.step<SESSIONS[state.si].steps.length-1){state.step++;render();window.scrollTo(0,0);}}
function prevStep(){if(state.step>0){state.step--;render();window.scrollTo(0,0);}}
function gotoStep(i){state.step=i;render();window.scrollTo(0,0);}

render();
</script>
</body>
</html>
